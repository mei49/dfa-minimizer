<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DFA Minimizer</title>
  <style>
    html { font-size: 90%; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: linear-gradient(180deg, #faf5f7 0%, #f5eef2 100%);
      color: #2a2328;
      min-height: 100vh;
      padding: 2.25rem 1.125rem;
      font-size: 1rem;
      line-height: 1.5;
    }
    .container { max-width: 684px; margin: 0 auto; }
    h1 {
      font-size: 1.575rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 1.575rem;
      color: #2a2328;
    }
    .card {
      background: #fff;
      border: 1px solid rgba(122, 82, 98, 0.14);
      border-radius: 13px;
      padding: 1.575rem 1.8rem;
      margin-bottom: 1.125rem;
      box-shadow: 0 1px 3px rgba(90, 60, 75, 0.06);
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    label { display: block; font-size: 0.9375rem; font-weight: 500; color: #5c4d56; margin-bottom: 5px; }
    input[type="text"] {
      width: 100%;
      padding: 10px 13px;
      font-size: 1rem;
      border: 1px solid rgba(122, 82, 98, 0.22);
      border-radius: 9px;
      outline: none;
      background: #fff;
      color: #2a2328;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="text"]:focus {
      border-color: #8b6a7a;
      box-shadow: 0 0 0 3px rgba(139, 106, 122, 0.16);
    }
    .hint { font-size: 0.875rem; color: #8a7a84; margin-top: 5px; line-height: 1.45; }
    code { font-family: ui-monospace, monospace; background: #f3eaee; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; color: #4a3d44; }
    button[type="submit"] {
      margin-top: 1.2rem;
      padding: 10px 25px;
      font-size: 1rem;
      font-weight: 600;
      background: #6b4d5c;
      color: #fff;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    button[type="submit"]:hover { background: #5a4050; }
    button[type="submit"]:active { transform: scale(0.99); }
    #result { max-width: 684px; margin-top: 0.45rem; }
    .footer-id {
      text-align: center;
      margin-top: 2.25rem;
      padding-top: 0.9rem;
      font-size: 0.81rem;
      color: #8a7a84;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>DFA minimizer</h1>

  <div class="card">
    <form action="/minimize" method="post" id="dfa-form">
      <div class="grid-2">
        <div class="field">
          <label for="states">States</label>
          <input type="text" id="states" name="states" placeholder="A, B, C" />
        </div>
        <div class="field">
          <label for="alphabet">Alphabet</label>
          <input type="text" id="alphabet" name="alphabet" placeholder="0, 1" />
        </div>
      </div>
      <div class="grid-2">
        <div class="field">
          <label for="start_state">Start state</label>
          <input type="text" id="start_state" name="start_state" placeholder="A" autocomplete="off" />
          <p class="hint">Must match one of the state names exactly (e.g. <code>A</code>).</p>
        </div>
        <div class="field">
          <label for="final">Final states</label>
          <input type="text" id="final" name="final" placeholder="C" />
        </div>
      </div>
      <div class="field">
        <label for="transitions">Transitions</label>
        <input type="text" id="transitions" name="transitions"
               placeholder="(A,0)->B, (A,1)->C, (B,0)->B, …" />
        <p class="hint">Format: <code>(state,symbol)->dest</code> separated by commas</p>
      </div>
      <button type="submit">Minimize &rarr;</button>
    </form>
  </div>

  <div id="result"></div>
  <p class="footer-id">SNEHA-2024UCA1890</p>
</div>

<script>
document.getElementById('dfa-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const body = new URLSearchParams(new FormData(form));
  const res = await fetch('/minimize', { method: 'POST', body });
  const html = await res.text();
  document.getElementById('result').innerHTML = html;
});
</script>
</body>
</html>
