<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DFA Minimizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: linear-gradient(180deg, #faf5f7 0%, #f5eef2 100%);
      color: #2a2328;
      min-height: 100vh;
      padding: 2.5rem 1.25rem;
      font-size: 16px;
      line-height: 1.5;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 1.75rem;
      color: #2a2328;
    }

    .card {
      background: #fff;
      border: 1px solid rgba(122, 82, 98, 0.14);
      border-radius: 14px;
      padding: 1.75rem 2rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 1px 3px rgba(90, 60, 75, 0.06);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 0.9375rem;
      font-weight: 500;
      color: #5c4d56;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      font-size: 1rem;
      border: 1px solid rgba(122, 82, 98, 0.22);
      border-radius: 10px;
      outline: none;
      background: #fff;
      color: #2a2328;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus {
      border-color: #8b6a7a;
      box-shadow: 0 0 0 3px rgba(139, 106, 122, 0.18);
    }

    .hint {
      font-size: 0.875rem;
      color: #8a7a84;
      margin-top: 6px;
      line-height: 1.45;
    }

    code {
      font-family: ui-monospace, monospace;
      background: #f3eaee;
      padding: 2px 7px;
      border-radius: 5px;
      font-size: 0.9em;
      color: #4a3d44;
    }

    button[type="submit"] {
      margin-top: 1.35rem;
      padding: 11px 28px;
      font-size: 1rem;
      font-weight: 600;
      background: #6b4d5c;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button[type="submit"]:hover { background: #5a4050; }
    button[type="submit"]:active { transform: scale(0.99); }

    /* Result area */
    #result h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: 1rem; color: #2a2328; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 1.25rem;
    }

    .metric {
      background: #f3eaee;
      border: 1px solid rgba(122, 82, 98, 0.1);
      border-radius: 10px;
      padding: 14px 16px;
    }

    .metric-label {
      font-size: 13px;
      color: #6e5c67;
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 24px;
      font-weight: 600;
      color: #2a2328;
    }

    .steps-table { width: 100%; }

    .step-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(122, 82, 98, 0.1);
    }

    .step-row:last-child { border-bottom: none; }

    .step-label {
      font-family: ui-monospace, monospace;
      font-size: 14px;
      font-weight: 600;
      color: #8a7a84;
      min-width: 34px;
      padding-top: 2px;
    }

    .step-groups {
      font-family: ui-monospace, monospace;
      font-size: 15px;
      flex: 1;
      color: #2a2328;
    }

    .badge {
      display: inline-block;
      margin-left: 10px;
      font-size: 12px;
      font-family: system-ui, sans-serif;
      padding: 3px 10px;
      border-radius: 6px;
      background: #e8f0ea;
      color: #2d5a3d;
      vertical-align: middle;
    }

    .note {
      font-size: 15px;
      color: #6e5c67;
      margin-top: 12px;
      line-height: 1.5;
    }

    .error {
      background: #fdf2f4;
      border: 1px solid #e8b4bc;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 15px;
      color: #8b2c3a;
      line-height: 1.5;
    }

    #result { margin-top: 0.5rem; }

    .footer-id {
      text-align: center;
      margin-top: 2.5rem;
      padding-top: 1rem;
      font-size: 0.8125rem;
      color: #8a7a84;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>DFA minimizer</h1>

  <div class="card">
    <form action="/minimize" method="post" id="dfa-form">
      <div class="grid-2">
        <div class="field">
          <label for="states">States</label>
          <input type="text" id="states" name="states" placeholder="A, B, C" />
        </div>
        <div class="field">
          <label for="alphabet">Alphabet</label>
          <input type="text" id="alphabet" name="alphabet" placeholder="0, 1" />
        </div>
      </div>

      <div class="field">
        <label for="final">Final states</label>
        <input type="text" id="final" name="final" placeholder="C" />
      </div>

      <div class="field">
        <label for="transitions">Transitions</label>
        <input type="text" id="transitions" name="transitions"
               placeholder="(A,0)->B, (A,1)->C, (B,0)->B, …" />
        <p class="hint">Format: <code>(state,symbol)->dest</code> separated by commas</p>
      </div>

      <button type="submit">Minimize →</button>
    </form>
  </div>

  <div id="result"></div>
</div>

<script>
document.getElementById('dfa-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const body = new URLSearchParams(new FormData(form));
  const res = await fetch('/minimize', { method: 'POST', body });
  const html = await res.text();
  document.getElementById('result').innerHTML = html;
});
</script>

<p class="footer-id">SNEHA-2024UCA1890</p>
</body>
</html>
