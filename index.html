<!DOCTYPE html>
<html>
<head>
    <title>DFA Minimizer</title>
</head>
<body>

<h2>DFA Minimizer</h2>

<form action="/minimize" method="post">
    <label>States:</label><br>
    <input name="states"><br><br>

    <label>Alphabet:</label><br>
    <input name="alphabet"><br><br>

    <label>Final States:</label><br>
    <input name="final"><br><br>

    <label>Transitions:</label><br>
    <input name="transitions" size="60"><br><br>

    <button type="submit">Minimize</button>
</form>

</body>
</html>
